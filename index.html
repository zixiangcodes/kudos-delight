<!doctype html>
<html>

<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.css">
    <title>☀️ Kudos Delight! 🌈</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="container">
        <hr>
        <h1>
            <span class="icon material-symbols-outlined">person_celebrate</span>
            Kudos Delight!
        </h1>
        <p class="display" id="compliment-display"></p>
        <hr>
        <div>
            <button class="first-kudo-button" id="firstKudoButton">First Kudos</button>
            <button class="random-kudos-button" id="generateRandomKudosButton">Random Kudos </button>
            <button class="last-kudo-button" id="lastKudoButton">Last Kudos</button>
        </div>

        <div>
            <button class="nav-buttons" id="prevKudoButton">Previous Kudos</button>
            <button class="nav-buttons" id="nextKudoButton">Next Kudos</button>
        </div>

        <div>
            <button class="btn-secondary" id="toggleFormButton">Add Kudos 🎀</button>
            <p id="successMessage" style="display: none">🥳 Kudos added successfully! 🎉</p>
            <form id="complimentForm" class="hidden" autocomplete="off">
                <label for="complimentInput">Write a Kudo:</label>
                <textarea id="complimentInput" rows="4"></textarea>
                <button class="submit-button" type="submit">Submit</button>
            </form>
        </div>
        <div>
            <button id="deleteKudoButton" class="btn-delete">Delete Current Kudo 🗑️</button>
            <p id="deleteMessage" style="display: none">🗑️ Kudo deleted successfully! 🎉</p>
        </div>
        <hr>
        <p> By Zack Ng | Last Updated: 1 March 2026, V4.0 | Firebase Realtime Database </p>
        <p id="kudoCounter">Total Kudos in Database: 0</p>
        <hr>
    </div>
    <script src="index.js" type="module"></script>
</body>

</html>
